apiVersion: v1
kind: Service
metadata:
  name: {{ include "store-lab.fullname" . }}-api
  labels:
    {{- include "store-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.api.port }}

