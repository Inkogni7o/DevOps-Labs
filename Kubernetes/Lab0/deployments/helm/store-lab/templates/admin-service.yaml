apiVersion: v1
kind: Service
metadata:
  name: {{ include "store-lab.fullname" . }}-admin
  labels:
    {{- include "store-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: admin
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: admin
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.admin.port }}

