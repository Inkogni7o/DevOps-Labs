apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "store-lab.fullname" . }}-web
  labels:
    {{- include "store-lab.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "store-lab.labels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: {{ .Values.web.image | quote }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.web.port }}
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: http://{{ include "store-lab.fullname" . }}-api
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}

