apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "store-lab.fullname" . }}-config
  labels:
    {{- include "store-lab.labels" . | nindent 4 }}
data:
  APP_NAME: {{ .Values.config.appName | quote }}
  APP_VERSION: {{ .Values.config.appVersion | quote }}
  ENVIRONMENT: {{ .Values.config.environment | quote }}
  CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  ACCESS_TOKEN_EXPIRE_MINUTES: {{ .Values.config.accessTokenExpireMinutes | quote }}

