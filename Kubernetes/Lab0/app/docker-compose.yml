services:
  api:
    build:
      context: ./backend
    env_file:
      - ./.env.local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "--loglevel=INFO"]
    env_file:
      - ./.env.local
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: ./backend
    command: ["alembic", "upgrade", "head"]
    env_file:
      - ./.env.local
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: ./backend
    command: ["python", "-m", "app.db.seed"]
    env_file:
      - ./.env.local
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  web:
    build:
      context: ./web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

  admin:
    build:
      context: ./admin
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3000"
    depends_on:
      - api

  postgres:
    image: postgres:17.2-alpine
    environment:
      POSTGRES_DB: store_lab
      POSTGRES_USER: store_lab
      POSTGRES_PASSWORD: store_lab_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U store_lab -d store_lab"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: store_lab
      MINIO_ROOT_PASSWORD: store_lab_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
